---
apic:
  tenants:
    - name: jorgquin
      managed: true
      description: 10.5.8.0/21
      security_domains:
        - jorgquin

      policies:
        dhcp_relay_policies:
          - name: dhcp.uktme.cisco.com
            description: "dhcp.uktme.cisco.com"
            providers:
              - ip: 10.237.97.133
                type: external_epg
                tenant: shared-services
                l3out: shared-services.vrf-01-bgp-as-64801
                external_endpoint_group: core-services-subnets

      filters:
        - name: 'icmp'
          entries:
            - name: 'icmp'
              protocol: icmp

        - name: 'src-any-dst-any'
          entries:
            - name: 'src-any-dst-any'
              ethertype: unspecified

        - name: 'tcp-src-any-dst-22'
          entries:
            - name: 'tcp-src-any-dst-22'
              ethertype: ipv4
              protocol: tcp
              destination_from_port: 22
              destination_to_port: 22

        - name: 'tcp-src-any-dst-151'
          entries:
            - name: 'tcp-src-any-dst-151'
              ethertype: ipv4
              protocol: tcp
              destination_from_port: 151
              destination_to_port: 151

        - name: 'tcp-src-any-dst-152'
          entries:
            - name: 'tcp-src-any-dst-152'
              ethertype: ipv4
              protocol: tcp
              destination_from_port: 152
              destination_to_port: 152

        - name: 'tcp-src-any-dst-80'
          entries:
            - name: 'tcp-src-any-dst-80'
              ethertype: ipv4
              protocol: tcp
              destination_from_port: 80
              destination_to_port: 80

        - name: 'tcp-src-any-dst-443'
          entries:
            - name: 'tcp-src-any-dst-443'
              ethertype: ipv4
              protocol: tcp
              destination_from_port: 443
              destination_to_port: 443

      imported_contracts:
        - name: permit-to-shared-services-all-external-subnets
          tenant: shared-services
          contract: permit-to-all-external-subnets

        - name: permit-from-shared-services-core-services
          tenant: shared-services
          contract: permit-from-core-services

        - name: permit-to-shared-services-core-services
          tenant: shared-services
          contract: permit-to-core-services

        - name: permit-from-shared-services-lab-desktops
          tenant: shared-services
          contract: permit-from-lab-desktops

      contracts:
          - name: inter-epg
            scope: context
            subjects:
              - name: redirect
                filters:
                  - filter: 'icmp'
                    action: permit
                  - filter: 'tcp-src-any-dst-22'
                    action: permit

          - name: inter-esg
            scope: context
            subjects:
              - name: redirect
                filters:
                  - filter: 'icmp'
                    action: permit
                  - filter: 'tcp-src-any-dst-22'
                    action: permit

          - name: intra-epg
            scope: context
            subjects:
              - name: permit-any-any
                filters:
                  - filter: src-any-dst-any
                    action: permit

          - name: intra-esg
            scope: context
            subjects:
              - name: permit-any-any
                filters:
                  - filter: src-any-dst-any
                    action: permit

          - name: intra-esg-production
            scope: context
            subjects:
              - name: redirect
                filters:
                  - filter: 'icmp'
                    action: permit
                  - filter: 'tcp-src-any-dst-22'
                    action: permit

          - name: permit-to-development
            description: permit to development applications
            scope: tenant
            subjects:
              - name: src-any-dst-any
                filters:
                  - filter: src-any-dst-any

          - name: permit-to-epg-10.5.8.0_24
            scope: context
            subjects:
              - name: redirect
                filters:
                  - filter: 'tcp-src-any-dst-151'
                    action: permit

          - name: permit-to-esg-10.5.8.0_24
            scope: context
            subjects:
              - name: redirect
                filters:
                  - filter: 'tcp-src-any-dst-151'
                    action: permit

          - name: permit-intra-esg-10.5.8.0_24
            scope: context
            subjects:
              - name: src-any-dst-any
                filters:
                  - filter: src-any-dst-any

          - name: permit-to-epg-10.5.9.0_24
            scope: context
            subjects:
              - name: redirect
                filters:
                  - filter: 'tcp-src-any-dst-151'
                    action: permit

          - name: permit-to-esg-10.5.9.0_24
            scope: context
            subjects:
              - name: redirect
                filters:
                  - filter: 'tcp-src-any-dst-152'
                    action: permit

          - name: permit-intra-esg-10.5.9.0_24
            scope: context
            subjects:
              - name: src-any-dst-any
                filters:
                  - filter: src-any-dst-any

          - name: permit-to-epg-10.5.10.0_24
            scope: context
            subjects:
              - name: redirect
                filters:
                  - filter: 'tcp-src-any-dst-151'
                    action: permit

          - name: permit-to-esg-10.5.10.0_24
            scope: tenant
            subjects:
              - name: src-any-dst-any
                filters:
                  - filter: src-any-dst-any

          - name: permit-intra-esg-10.5.10.0_24
            scope: context
            subjects:
              - name: src-any-dst-any
                filters:
                  - filter: src-any-dst-any

          - name: permit-to-epg-10.5.11.0_24
            scope: context
            subjects:
              - name: redirect
                filters:
                  - filter: 'tcp-src-any-dst-151'
                    action: permit

          - name: permit-to-esg-10.5.11.0_24
            scope: tenant
            subjects:
              - name: src-any-dst-any
                filters:
                  - filter: src-any-dst-any

          - name: permit-intra-esg-10.5.11.0_24
            scope: context
            subjects:
              - name: src-any-dst-any
                filters:
                  - filter: src-any-dst-any

          - name: permit-to-production
            description: permit to production applications
            scope: tenant
            subjects:
              - name: src-any-dst-any
                filters:
                  - filter: src-any-dst-any

          - name: permit-to-tn-jorgquin
            description: permit to tenant
            scope: global
            subjects:
              - name: src-any-dst-any
                filters:
                  - filter: src-any-dst-any

          - name: intra-vrf
            description: vzAny is contract Provider
            scope: context
            subjects:
              - name: src-any-dst-any
                filters:
                  - filter: src-any-dst-any

      vrfs:
        - name: vrf-01
          description: configured with NAC
          alias: internal-vrf-01
          contracts:
            consumers:
              - intra-vrf
            imported_consumers:
              - permit-to-shared-services-all-external-subnets
              - permit-from-shared-services-core-services
              - permit-to-shared-services-core-services
              - permit-from-shared-services-lab-desktops
            providers:
              - intra-vrf
          leaked_internal_prefixes:
            - prefix: 10.5.8.0/24
              public: true
              destinations:
                - tenant: shared-services
                  vrf: vrf-01
            - prefix: 10.5.9.0/24
              public: true
              destinations:
                - tenant: shared-services
                  vrf: vrf-01
            - prefix: 10.5.10.0/24
              public: true
              destinations:
                - tenant: shared-services
                  vrf: vrf-01
            - prefix: 10.5.11.0/24
              public: true
              destinations:
                - tenant: shared-services
                  vrf: vrf-01

      bridge_domains:
        - name: 6.6.6.0_24
          description: PBR subnet data-01
          alias: internal-vrf-01
          unknown_unicast: proxy
          vrf: vrf-01
          subnets:
            - ip: 6.6.6.1/24

        - name: 10.5.8.0_24
          alias: internal-vrf-01
          unknown_unicast: proxy
          vrf: vrf-01
          subnets:
            - ip: 10.5.8.1/24
          dhcp_labels:
            - dhcp_relay_policy: dhcp.uktme.cisco.com

        - name: 10.5.9.0_24
          alias: internal-vrf-01
          unknown_unicast: proxy
          vrf: vrf-01
          subnets:
            - ip: 10.5.9.1/24
          dhcp_labels:
            - dhcp_relay_policy: dhcp.uktme.cisco.com

        - name: 10.5.10.0_24
          alias: internal-vrf-01
          unknown_unicast: proxy
          vrf: vrf-01
          subnets:
            - ip: 10.5.10.1/24
