                  vlan: 1275
                  primary_vlan: 1276
                - node_id: 2104
                  pod_id: 2
                  port: 7
                  vlan: 1275
                  primary_vlan: 1276

            - name: '10.5.11.0_24'
              description: no contracts on this EPG, use ESGs for contracts
              alias: internal-vrf-01
              bridge_domain: '10.5.11.0_24'
              physical_domains:
                - ucsc-c220m3-vds-01
