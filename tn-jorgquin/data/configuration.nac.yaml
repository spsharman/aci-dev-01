            - dhcp_relay_policy: dhcp.uktme.cisco.com

        - name: 10.5.11.0_24
          alias: internal-vrf-01
          unknown_unicast: proxy
          vrf: vrf-01
          subnets:
            - ip: 10.5.11.1/24
          dhcp_labels:
            - dhcp_relay_policy: dhcp.uktme.cisco.com

      application_profiles:
        - name: 'applications'
          description: 'ESGs are used to define security groups' 
          endpoint_security_groups:
            - name: development
              vrf: vrf-01
              shutdown: false
              intra_esg_isolation: false
              preferred_group: false
              tag_selectors:
                - key: Function
                  operator: equals
                  value: tn-jorgquin:applications:development
              contracts:
                consumers:
                  - permit-to-production

            - name: production
              vrf: vrf-01
              shutdown: false
              intra_esg_isolation: false
              preferred_group: false
              tag_selectors:
                - key: Function
                  operator: equals
                  value: tn-jorgquin:applications:production
              contracts:
                providers:
                  - permit-to-production
                intra_esgs:
                  - intra-esg-production

        - name: 'network-segments'
          description: EPGs provide the VLAN backing for application workloads - no contracts on EPGs
          endpoint_groups:      
            - name: '10.5.8.0_24'
              description: no contracts on this EPG, use ESGs for contracts
              alias: internal-vrf-01
              bridge_domain: '10.5.8.0_24'
              vmware_vmm_domains:
                - name: 'hx-dev-01-vds-01'
                  u_segmentation: true
                  primary_vlan: 1271
                  secondary_vlan: 1272
                  deployment_immediacy: immediate
                  resolution_immediacy: immediate

            - name: '10.5.9.0_24'
              description: no contracts on this EPG, use ESGs for contracts
              alias: internal-vrf-01
              bridge_domain: '10.5.9.0_24'
              vmware_vmm_domains:
                - name: 'hx-dev-01-vds-01'
                  u_segmentation: true
                  primary_vlan: 1273
                  secondary_vlan: 1274 
                  deployment_immediacy: immediate
                  resolution_immediacy: immediate

            - name: '10.5.10.0_24'
