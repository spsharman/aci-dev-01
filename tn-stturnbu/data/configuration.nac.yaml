# Bridge Domains
      bridge_domains:
        - name: 6.6.6.0_24
          description: PBR subnet
          alias: internal-vrf
          unknown_unicast: proxy
          vrf: vrf-02
          subnets:
            - ip: 6.6.6.1/24
              public: false
              shared: false
              nd_ra_prefix: false

        - name: 10.6.0.0_24
          alias: internal-vrf-02
          unknown_unicast: proxy
          vrf: vrf-02
          subnets:
            - ip: 10.6.0.1/24
          dhcp_labels:
            - dhcp_relay_policy: dhcp.uktme.cisco.com

        - name: 10.6.1.0_24
          alias: internal-vrf-02
          unknown_unicast: proxy
          vrf: vrf-02
          subnets:
            - ip: 10.6.1.1/24
          dhcp_labels:
            - dhcp_relay_policy: dhcp.uktme.cisco.com

# Application Profiles
      application_profiles:
        - name: 'network-segments'
          description: EPGs provide the VLAN backing for application workloads
          endpoint_groups:      
            - name: 10.6.0.0_24
              alias: internal-vrf-02
              bridge_domain: 10.6.0.0_24
              vmware_vmm_domains:
                - name: hx-dev-01-vds-01
                  u_segmentation: true
                  deployment_immediacy: immediate
                  resolution_immediacy: immediate
                  primary_vlan: 1247
                  secondary_vlan: 1248

            - name: 10.6.1.0_24
              alias: internal-vrf-02
              bridge_domain: 10.6.1.0_24
              vmware_vmm_domains:
                - name: hx-dev-01-vds-01
                  u_segmentation: true
                  deployment_immediacy: immediate
                  resolution_immediacy: immediate
                  primary_vlan: 1249
                  secondary_vlan: 1250

        - name: network-security-groups
          endpoint_security_groups:
            - name: 10.6.0.0_24
              vrf: vrf-02
              shutdown: false
              intra_esg_isolation: false
              epg_selectors:              
                - application_profile: network-segments
                  endpoint_group: 10.6.0.0_24

            - name: 10.6.1.0_24
              vrf: vrf-02
              shutdown: false
              intra_esg_isolation: false
              epg_selectors:
                - application_profile: network-segments
                  endpoint_group: 10.6.1.0_24

        - name: endpoint-security-groups
          endpoint_security_groups:
            - name: csr-1kv-01-pod-1-10.6.0.254
              vrf: vrf-02
              shutdown: false
              intra_esg_isolation: false
              ip_subnet_selectors:
                - value: 10.6.0.254/32
              contracts:
                providers:
                  - permit-to-csr-1kv-01-pod-1

            - name: ubuntu-01-10.6.0.25
              vrf: vrf-02
              shutdown: false
              intra_esg_isolation: false
              ip_subnet_selectors:
                - value: 10.6.0.25/32
              contracts:
                consumers:
                  - permit-to-csr-1kv-01-pod-1
                  - permit-to-ubuntu-02-10.6.0.26

            - name: ubuntu-02-10.6.0.26
              vrf: vrf-02
              shutdown: false
              intra_esg_isolation: false
              ip_subnet_selectors:
                - value: 10.6.0.26/32
              contracts:
                consumers:
                  - permit-to-csr-1kv-01-pod-1
                providers:
                  - permit-to-ubuntu-02-10.6.0.26