---
apic:
  tenants:
    - name: stturnbu
      description: Routable IP range 10.6.0.0/21
      security_domains:
        - stturnbu

#Policies
      policies:
        dhcp_relay_policies:
          - name: dhcp.uktme.cisco.com
            description: "dhcp.uktme.cisco.com"
            providers:
              - ip: 10.237.97.133
                type: external_epg
                tenant: stturnbu
                l3out: stturnbu.vrf-01-bgp-AS-65151
                external_endpoint_group: all-external-subnets

# Filters
      filters:
        - name: 'icmp'
          entries:
            - name: 'icmp'
              protocol: icmp

        - name: 'permit-src-any-dst-any'
          entries:
            - name: 'permit-src-any-dst-any'
              ethertype: unspecified

# Contracts
      imported_contracts:
        - name: permit-from-lab-desktops
          tenant: shared-services
          contract: permit-from-lab-desktops

        - name: 'permit-from-core-services'
          tenant: shared-services
          contract: permit-from-core-services

        - name: 'permit-to-core-services'
          tenant: shared-services
          contract: permit-to-core-services
          
      contracts:
        - name: intra-tenant
          scope: context
          subjects:
            - name: permit-src-any-dst-any
              filters: 
                - filter: permit-src-any-dst-any

        - name: permit-to-esg-10.6.0.0_24
          scope: context
          subjects:
            - name: permit-src-any-dst-any
              filters:
                - filter: permit-src-any-dst-any

        - name: permit-to-csr-1kv-01-pod-1
          scope: context
          subjects:
            - name: permit-src-any-dst-any
              filters:
                - filter: permit-src-any-dst-any

        - name: permit-to-ubuntu-02-10.6.0.26
          scope: context
          subjects:
            - name: permit-src-any-dst-any
              filters:
                - filter: permit-src-any-dst-any

# VRFs
      vrfs:
        - name: vrf-01
          description: configured with NAC - external vrf for tn-stturnbu
          alias: external-vrf

        - name: vrf-02
          description: configured with NAC - internal vrf for tn-stturnbu
          alias: internal-vrf

