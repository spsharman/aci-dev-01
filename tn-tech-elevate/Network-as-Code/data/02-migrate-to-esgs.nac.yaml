# Notes:
#
# Description: Build v01 delta from v00. Splits the tenant into outside and inside VRFs (vrf-01 and vrf-02), moves internal bridge domains to vrf-02, adds leaked_external_prefixes default-route intent, and adds the external-subnet contract for inside-to-outside access.

# subnet 10.5.0.0/21
---
apic:
  tenants:
    - name: tech-elevate
      description: blueprint - v02
      managed: true
      security_domains:
        - tech-elevate

# Policies
      policies:
        bgp_address_family_context_policies:
          - name: cilium-cni-bgp-af-context
            description: BGP weights and paths policies for cilium cni
            ebgp_distance: 20
            ibgp_distance: 200
            local_distance: 220
            ebgp_max_ecmp: 64
            ibgp_max_ecmp: 64
            local_max_ecmp: 4
            enable_host_route_leak: false

        bgp_best_path_policies:
          - name: cilium-cni-bgp-as-path
            description: BGP best path policy for cilium cni
            as_path_multipath_relax: true
            ignore_igp_metric: false

        bgp_peer_prefix_policies:
          - name: cilium-cni-bgp-prefix-policy
            description: BGP prefix policies for cilium cni
            action: 'reject'
            threshold: 75
            max_prefixes: 500

        bgp_timer_policies:
          - name: cilium-cni-bgp-timers
            description: BGP timer policies for cilium cni
            keepalive_interval: 1
            hold_interval: 3
            stale_interval: 6
            graceful_restart_helper: true
            maximum_as_limit: 1

        dhcp_relay_policies:
          - name: dhcp.uktme.cisco.com
            description: "dhcp.uktme.cisco.com"
            providers:
              - ip: 10.237.97.133
                type: external_epg
                tenant: shared-services
                l3out: shared-services.vrf-01-bgp-as-64801
                external_endpoint_group: core-services-subnets

        match_rules:
          - name: pod-subnets-redistribution
            description: match all pod subnets
            prefixes:
              - ip: 0.0.0.0/0
                aggregate: true
                to_length: 32

          - name: match-k8s-node-subnet
            description: matches K8s node subnets
            prefixes:
              - ip: 10.237.97.224/28
                aggregate: false

          - name: match-k8s-applications
            description: matches K8s applications VIP
            prefixes:
              - ip: 10.237.99.72/27
                aggregate: true

        ospf_interface_policies:
          - name: OSPF_p2p
            cost: unspecified
            passive_interface: false
            mtu_ignore: false
            advertise_subnet: true
            bfd: false
            hello_interval: 10
            dead_interval: 40
            network_type: p2p
            priority: 1
            lsa_retransmit_interval: 5
            lsa_transmit_delay: 1

        route_control_route_maps:
          - name: floating-L3out-redistribution-optimization
            type: global
            contexts:
              - name: pods-subnets
                action: permit
                match_rules:
                  - pod-subnets-redistribution
                set_rule: floating-L3out-bgp-redistribution-optimization

        set_rules:
          - name: floating-L3out-bgp-redistribution-optimization
            community_mode: append
            multipath: false
            next_hop_propagation: false

# Filters
      filters:
        - name: 'icmp'
          entries:
            - name: 'icmp'
              protocol: icmp

        - name: 'src-any-dst-any'
          entries:
            - name: 'src-any-dst-any'
              ethertype: unspecified

# Contracts
      contracts:
        - name: intra-vrf
          description: vzAny is contract Consumer and Provider
          scope: context
          subjects:
            - name: permit-src-any-dst-any
              filters: 
                - filter: src-any-dst-any

        - name: permit-to-all-external-subnets-from-esg-all-epgs
          description: esg-all-epgs is the contract Consumer
          scope: tenant
          subjects:
            - name: permit-src-any-dst-any
              filters: 
                - filter: src-any-dst-any

        - name: permit-to-k8s-nodes
          description: permit to k8s nodes
          scope: tenant
          subjects:
            - name: permit-src-any-dst-any
              filters: 
                - filter: src-any-dst-any

        - name: permit-to-k8s-applications
          description: permit to k8s applications
          scope: tenant
          subjects:
            - name: permit-src-any-dst-any
              filters: 
                - filter: src-any-dst-any

# VRFs
      vrfs:
        - name: vrf-02
          description: configured with NAC
          alias: outside-vrf
          leaked_external_prefixes:
            - prefix: 0.0.0.0/0
              destinations:
                - tenant: tech-elevate
                  vrf: vrf-01

        - name: vrf-01
          description: configured with NAC
          alias: inside-vrf
          leaked_internal_prefixes:
            - prefix: 10.5.0.0/24
              public: true
              destinations:
                - tenant: tech-elevate
                  vrf: vrf-02
            - prefix: 10.5.1.0/24
              public: true
              destinations:
                - tenant: tech-elevate
                  vrf: vrf-02
            - prefix: 10.5.2.0/24
              public: true
              destinations:
                - tenant: tech-elevate
                  vrf: vrf-02

          leaked_external_prefixes:
            - prefix: 10.237.97.224/28
              destinations:
                - tenant: tech-elevate
                  vrf: vrf-02
            - prefix: 10.237.99.72/29
              from_prefix_length: 32
              to_prefix_length: 32
              destinations:
                - tenant: tech-elevate
                  vrf: vrf-02

# L3out
      l3outs:
        - name: vrf-02-bgp-as-64805
          alias: outside-vrf-to-core
          description: L3out peering to core
          vrf: vrf-02
          domain: tech-elevate.vrf-02
          ospf:
            area: backbone
            area_type: regular
          export_route_map:
            type: global
            contexts:
              - name: permit-k8s-node-subnet
                order: 0
                action: permit
                match_rules:
                  - match-k8s-node-subnet
              - name: permit-k8s-applications
                order: 1
                action: permit
                match_rules:
                  - match-k8s-applications

# Nodes
          node_profiles:
            - name: border-leafs-pod-1
              nodes:
                - node_id: 1101
                  pod_id: 1
                  router_id: 110.1.0.0
                  router_id_as_loopback: false
                  loopbacks:
                    - 110.1.0.5

                - node_id: 1102
                  pod_id: 1
                  router_id: 110.2.0.0
                  router_id_as_loopback: false
                  loopbacks:
                    - 110.2.0.5

              bgp_peers:
                - ip: 12.0.0.3
                  description: L12-C93180YC-FX-01
                  remote_as: 64800  
                  local_as: 64805
                  allow_self_as: false
                  as_override: true
                  disable_peer_as_check: true
                  next_hop_self: false
                  send_community: false
                  send_ext_community: false
                  allowed_self_as_count: 3
                  bfd: false
                  disable_connected_check: false
                  ttl: 2
                  remove_all_private_as: false
                  remove_private_as: false
                  replace_private_as_with_local_as: false
                  unicast_address_family: true
                  multicast_address_family: false
                  admin_state: true
                  as_propagate: no-prepend

                - ip: 12.0.0.4
                  description: L12-C93180YC-EX-02
                  remote_as: 64800  
                  local_as: 64805
                  allow_self_as: false
                  as_override: true
                  disable_peer_as_check: true
                  next_hop_self: false
                  send_community: false
                  send_ext_community: false
                  allowed_self_as_count: 3
                  bfd: false
                  disable_connected_check: false
                  ttl: 2
                  remove_all_private_as: false
                  remove_private_as: false
                  replace_private_as_with_local_as: false
                  unicast_address_family: true
                  multicast_address_family: false
                  admin_state: true
                  as_propagate: no-prepend

# Interfaces
              interface_profiles:
                - name: leaf-1101-eth7.14
                  description: L12-C93180YC-FX-01 eth1/7.14
                  interfaces:
                    - node_id: 1101
                      pod_id: 1
                      port: 7
                      vlan: 14
                      svi: false
                      ip: 10.237.97.96/31
                      mtu: inherit
                      mac: 10:12:BD:F8:19:FF
                  ospf:
                    policy: OSPF_p2p

                - name: leaf-1101-eth8.14
                  description: L12-C93180YC-EX-02 eth1/8.14
                  interfaces:
                    - node_id: 1101
                      pod_id: 1
                      port: 8
                      vlan: 14
                      svi: false
                      ip: 10.237.97.98/31
                      mtu: inherit
                      mac: 10:12:BD:F8:19:FF
                  ospf:
                    policy: OSPF_p2p

                - name: leaf-1102-eth7.14
                  description: L12-C93180YC-EX-02 eth1/7.14
                  interfaces:
                    - node_id: 1102
                      pod_id: 1
                      port: 7
                      vlan: 14
                      svi: false
                      ip: 10.237.97.100/31
                      mtu: inherit
                      mac: 10:22:BD:F8:19:FF
                  ospf:
                    policy: OSPF_p2p

                - name: leaf-1102-eth8.14
                  description: L12-C93180YC-FX-01 eth1/8.14
                  interfaces:
                    - node_id: 1102
                      pod_id: 1
                      port: 8
                      vlan: 14
                      svi: false
                      ip: 10.237.97.102/31
                      mtu: inherit
                      mac: 10:12:BD:F8:19:FF
                  ospf:
                    policy: OSPF_p2p

# Nodes
            - name: border-leafs-pod-2
              nodes:
                - node_id: 2101
                  pod_id: 2
                  router_id: 210.1.0.0
                  router_id_as_loopback: true
                  loopbacks:
                    - 210.1.0.5

                - node_id: 2102
                  pod_id: 2
                  router_id: 210.2.0.0
                  router_id_as_loopback: true
                  loopbacks:
                    - 210.2.0.5

              bgp_peers:
                - ip: 13.0.0.3
                  description: L13-C93180YC-FX-01
                  remote_as: 64800  
                  local_as: 64805
                  allow_self_as: false
                  as_override: true
                  disable_peer_as_check: true
                  next_hop_self: false
                  send_community: false
                  send_ext_community: false
                  allowed_self_as_count: 3
                  bfd: false
                  disable_connected_check: false
                  ttl: 2
                  remove_all_private_as: false
                  remove_private_as: false
                  replace_private_as_with_local_as: false
                  unicast_address_family: true
                  multicast_address_family: false
                  admin_state: true
                  as_propagate: no-prepend

                - ip: 13.0.0.4
                  description: L13-C93180YC-FX-02
                  remote_as: 64800  
                  local_as: 64805
                  allow_self_as: false
                  as_override: true
                  disable_peer_as_check: true
                  next_hop_self: false
                  send_community: false
                  send_ext_community: false
                  allowed_self_as_count: 3
                  bfd: false
                  disable_connected_check: false
                  ttl: 2
                  remove_all_private_as: false
                  remove_private_as: false
                  replace_private_as_with_local_as: false
                  unicast_address_family: true
                  multicast_address_family: false
                  admin_state: true
                  as_propagate: no-prepend

# Interfaces
              interface_profiles:
                - name: leaf-2101-eth7.14
                  description: L13-C93180YC-FX-01 eth1/7.14
                  interfaces:
                    - node_id: 2101
                      pod_id: 2
                      port: 7
                      vlan: 14
                      svi: false
                      ip: 10.237.97.104/31
                      mtu: inherit
                      mac: 10:12:BD:F8:19:FF
                  ospf:
                    policy: OSPF_p2p

                - name: leaf-2101-eth8.14
                  description: L13-C93180YC-EX-02 eth1/8.14
                  interfaces:
                    - node_id: 2101
                      pod_id: 2
                      port: 8
                      vlan: 14
                      svi: false
                      ip: 10.237.97.106/31
                      mtu: inherit
                      mac: 10:12:BD:F8:19:FF
                  ospf:
                    policy: OSPF_p2p

                - name: leaf-2102-eth7.14
                  description: L13-C93180YC-FX-02 eth1/7.14
                  interfaces:
                    - node_id: 2102
                      pod_id: 2
                      port: 7
                      vlan: 14
                      svi: false
                      ip: 10.237.97.108/31
                      mtu: inherit
                      mac: 10:22:BD:F8:19:FF
                  ospf:
                    policy: OSPF_p2p

                - name: leaf-2102-eth8.14
                  description: L13-C93180YC-FX-01 eth1/8.14
                  interfaces:
                    - node_id: 2102
                      pod_id: 2
                      port: 8
                      vlan: 14
                      svi: false
                      ip: 10.237.97.110/31
                      mtu: inherit
                      mac: 10:12:BD:F8:19:FF
                  ospf:
                    policy: OSPF_p2p

# extEPGs
          external_endpoint_groups:
            - name: dummy-extEPG-for-vrf-01-bgp-AS-64805
              description: do not use - this is a placeholder to enable the L3out to be created for vrf-01-bgp-AS-64805

# L3out
        - name: vrf-01-bgp-AS-64808
          alias: inside-vrf-to-k8s-nodes
          description: L3out SVI to K8s environment
          vrf: vrf-01
          domain: tech-elevate.vrf-01
          import_route_control_enforcement: false
          redistribution_route_maps:
            - source: attached-host
              route_map: floating-L3out-redistribution-optimization

# Nodes
          node_profiles:
            - name: border-leafs
              nodes:
                - node_id: 1101
                  pod_id: 1
                  router_id: 110.1.0.0
                  router_id_as_loopback: false
                  loopbacks:
                    - 110.1.0.6

                - node_id: 1102
                  pod_id: 1
                  router_id: 110.2.0.0
                  router_id_as_loopback: false
                  loopbacks:
                    - 110.2.0.6

              bgp:
                timer_policy: cilium-cni-bgp-timers
                as_path_policy: cilium-cni-bgp-as-path

              # bgp_peers:
              #   - ip: 10.237.97.224/28
              #     description: k8s virtual machine nodes via FI
              #     remote_as: 64808
              #     local_as: 64805
              #     allow_self_as: false
              #     as_override: true
              #     disable_peer_as_check: true
              #     next_hop_self: false
              #     send_community: false
              #     send_ext_community: false
              #     allowed_self_as_count: 3
              #     bfd: false
              #     disable_connected_check: false
              #     ttl: 1
              #     remove_all_private_as: false
              #     remove_private_as: false
              #     replace_private_as_with_local_as: false
              #     unicast_address_family: true
              #     multicast_address_family: false
              #     admin_state: true
              #     as_propagate: no-prepend
              #     peer_prefix_policy: cilium-cni-bgp-prefix-policy
              #     # import_route_control: floating-L3out-optimizations

              interface_profiles:
                - name: k8s-nodes     
                  interfaces:
                    - node_id: 1101                       
                      mode: regular                       
                      floating_svi: true
                      scope: vrf
                      vlan: 54
                      paths:
                        - floating_ip: 10.237.97.227/28
                          physical_domain: tech-elevate.vrf-01
                      ip: 10.237.97.225/28
                      ip_shared: 10.237.97.228/28

                      bgp_peers:
                        - ip: 10.237.97.224/28
                          description: k8s virtual machine nodes via FI
                          remote_as: 64808
                          local_as: 64805
                          allow_self_as: false
                          as_override: true
                          disable_peer_as_check: true
                          next_hop_self: false
                          send_community: false
                          send_ext_community: false
                          allowed_self_as_count: 3
                          bfd: false
                          disable_connected_check: false
                          ttl: 1
                          remove_all_private_as: false
                          remove_private_as: false
                          replace_private_as_with_local_as: false
                          unicast_address_family: true
                          multicast_address_family: false
                          admin_state: true
                          as_propagate: no-prepend
                          peer_prefix_policy: cilium-cni-bgp-prefix-policy
                          # import_route_control: imported-routes

                    - node_id: 1102
                      mode: regular                       
                      floating_svi: true
                      scope: vrf                      
                      vlan: 54
                      paths:
                        - floating_ip: 10.237.97.227/28
                          physical_domain: tech-elevate.vrf-01
                      ip: 10.237.97.226/28
                      ip_shared: 10.237.97.228/28      

                      bgp_peers:
                        - ip: 10.237.97.224/28
                          description: k8s virtual machine nodes via FI
                          remote_as: 64808
                          local_as: 64805
                          allow_self_as: false
                          as_override: true
                          disable_peer_as_check: true
                          next_hop_self: false
                          send_community: false
                          send_ext_community: false
                          allowed_self_as_count: 3
                          bfd: false
                          disable_connected_check: false
                          ttl: 1
                          remove_all_private_as: false
                          remove_private_as: false
                          replace_private_as_with_local_as: false
                          unicast_address_family: true
                          multicast_address_family: false
                          admin_state: true
                          as_propagate: no-prepend
                          peer_prefix_policy: cilium-cni-bgp-prefix-policy
                          # import_route_control: floating-L3out-optimizations

                  dhcp_labels:
                    - dhcp_relay_policy: dhcp.uktme.cisco.com
                      scope: tenant

# extEPGs
          external_endpoint_groups:
            - name: dummy-extEPG-for-vrf-01-bgp-AS-64808
              description: do not use - this is a placeholder to enable the L3out to be created for vrf-01-bgp-AS-64808

# Bridge Domains
      bridge_domains:
        - name: 10.5.0.0_24
          unknown_unicast: proxy
          vrf: vrf-01
          subnets:
            - ip: 10.5.0.1/24
          dhcp_labels:
            - dhcp_relay_policy: dhcp.uktme.cisco.com
              scope: tenant

        - name: 10.5.1.0_24
          unknown_unicast: proxy
          vrf: vrf-01
          subnets:
            - ip: 10.5.1.1/24
          dhcp_labels:
            - dhcp_relay_policy: dhcp.uktme.cisco.com
              scope: tenant

        - name: 10.5.2.0_24
          unknown_unicast: proxy
          vrf: vrf-01
          subnets:
            - ip: 10.5.2.1/24
          dhcp_labels:
            - dhcp_relay_policy: dhcp.uktme.cisco.com
              scope: tenant

# Application profiles
      application_profiles:
        - name: 'network-segments-epgs-and-vlans'
          description: EPGs provide the VLAN backing for application workloads - no contracts are applied to these EPGs
          endpoint_groups:      
            - name: '10.5.0.0_24'
              bridge_domain: '10.5.0.0_24'
              vmware_vmm_domains:
                - name: hx-dev-01-vds-01
                  u_segmentation: true
                  deployment_immediacy: immediate
                  resolution_immediacy: immediate
                  primary_vlan: 1233
                  secondary_vlan: 1234

            - name: '10.5.1.0_24'
              bridge_domain: '10.5.1.0_24'
              vmware_vmm_domains:
                - name: hx-dev-01-vds-01
                  u_segmentation: true
                  deployment_immediacy: immediate
                  resolution_immediacy: immediate
                  primary_vlan: 1235
                  secondary_vlan: 1236

            - name: '10.5.2.0_24'
              bridge_domain: '10.5.2.0_24'
              vmware_vmm_domains:
                - name: hx-dev-01-vds-01
                  u_segmentation: true
                  deployment_immediacy: immediate
                  resolution_immediacy: immediate
                  primary_vlan: 1237
                  secondary_vlan: 1238

        - name: 'epg-mapped-security-groups'
          description: 'ESGs are used to define security groups' 
          endpoint_security_groups:
            - name: all-epgs
              vrf: vrf-01
              epg_selectors:
                - application_profile: 'network-segments-epgs-and-vlans'
                  endpoint_group: 10.5.0.0_24
                - application_profile: 'network-segments-epgs-and-vlans'
                  endpoint_group: 10.5.1.0_24
                - application_profile: 'network-segments-epgs-and-vlans'
                  endpoint_group: 10.5.2.0_24
              contracts:
                consumers:
                  - permit-to-all-external-subnets-from-esg-all-epgs
                  - permit-to-k8s-applications

        - name: 'external-subnets'
          description: 'ESGs are used to define security groups' 
          endpoint_security_groups:
            - name: all-external-subnets
              vrf: vrf-02
              ip_external_subnet_selectors:
                - ip: 0.0.0.0/1
                  shared: true
                - ip: 128.0.0.0/1
                  shared: true
              contracts:
                consumers:
                  - permit-to-k8s-nodes
                  - permit-to-k8s-applications
                providers:
                  - permit-to-all-external-subnets-from-esg-all-epgs

        - name: 'k8s-applications'
          description: 'ESGs are used to define security groups' 
          endpoint_security_groups:
            - name: all-k8s-applications
              vrf: vrf-01
              ip_external_subnet_selectors:
                - ip: 10.237.99.72/29
                  shared: true
              contracts:
                providers:
                  - permit-to-k8s-applications

        - name: 'k8s-nodes'
          description: 'ESGs are used to define security groups' 
          endpoint_security_groups:
            - name: all-k8s-nodes
              vrf: vrf-01
              ip_external_subnet_selectors:
                - ip: 10.237.97.224/28
                  shared: true
              contracts:
                providers:
                  - permit-to-k8s-nodes