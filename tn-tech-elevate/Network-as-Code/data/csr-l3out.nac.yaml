# Example NAC YAML file for creating a floating L3Out to a CSR router

---
apic:
  tenants:
    - name: test # name will be auto generated

# VRFs
      vrfs:
        - name: vrf-01 # I presume this will be common across all sessions - needs to be vrf-01 for the rest of the lab
          alias: inside-vrf-to-core # Needs to be configured
          description: L3out peering to core

# L3Outs
      l3outs:
        - name: vrf-01-static-route # this gets recreated and added to vrf-02 (outside vrf) in the migration step
          description: L3out peering to core
          vrf: vrf-01
          domain: Floating_L3out_HX_Cluster # Do you configure a unique domain per session?

# Nodes
          node_profiles:
            - name: border-leafs
              nodes:
                - node_id: 101
                  pod_id: 1
                  router_id: 192.168.1.101
                  router_id_as_loopback: true
                  static_routes:
                    - prefix: 0.0.0.0/0
                      next_hops:
                        - ip: 192.168.0.1
                          preference: 1
                          type: prefix
                      preference: 1
                      bfd: false

                - node_id: 102
                  pod_id: 1
                  router_id: 192.168.1.102
                  router_id_as_loopback: true
                  static_routes:
                    - prefix: 0.0.0.0/0
                      next_hops:
                        - ip: 192.168.0.1
                          preference: 1
                          type: prefix
                      preference: 1
                      bfd: false

# Interfaces
              interface_profiles:
                - name: csr-router-interfaces  
                  interfaces:
                    - node_id: 101                       
                      mode: regular                       
                      floating_svi: true
                      scope: vrf
                      vlan: 1403
                      paths:
                        - floating_ip: 192.168.0.100/24
                          physical_domain: vmware60-hybrid-cloud
                      ip: 192.168.0.101/24
                      ip_shared: 192.168.0.254/24

                    - node_id: 102                       
                      mode: regular                       
                      floating_svi: true
                      scope: vrf
                      vlan: 1403
                      paths:
                        - floating_ip: 192.168.0.100/24
                          physical_domain: vmware60-hybrid-cloud
                      ip: 192.168.0.102/24
                      ip_shared: 192.168.0.254/24

# extEPGs
          external_endpoint_groups:
            - name: all-external-subnets
              subnets:
                - prefix: 0.0.0.0/0
                  name: route-control-only
                  export_route_control: true
                  aggregate_export_route_control: true
                  shared_route_control: true
                  import_security: false

                - prefix: 0.0.0.0/1
                  shared_security: true
                  import_security: true

                - prefix: 128.0.0.0/1
                  shared_security: true
                  import_security: true