# Bridge Domains
      bridge_domains:
        - name: 6.6.6.0_24
          unknown_unicast: proxy
          vrf: vrf-02
          subnets:
            - ip: 6.6.6.1/24

        - name: 10.5.0.0_24
          unknown_unicast: proxy
          vrf: vrf-02
          subnets:
            - ip: 10.5.0.1/24
          dhcp_labels:
            - dhcp_relay_policy: dhcp.uktme.cisco.com
              scope: tenant

        - name: 10.5.1.0_24
          unknown_unicast: proxy
          vrf: vrf-02
          subnets:
            - ip: 10.5.1.1/24
          dhcp_labels:
            - dhcp_relay_policy: dhcp.uktme.cisco.com
              scope: tenant

        - name: 10.5.2.0_24
          unknown_unicast: proxy
          vrf: vrf-02
          subnets:
            - ip: 10.5.2.1/24
          dhcp_labels:
            - dhcp_relay_policy: dhcp.uktme.cisco.com
              scope: tenant

# Application profiles
      application_profiles:
        - name: 'network-segments'
          description: EPGs provide the VLAN backing for application workloads
          endpoint_groups:      
            - name: '10.5.0.0_24'
              bridge_domain: '10.5.0.0_24'
              vmware_vmm_domains:
                - name: hx-dev-01-vds-01
                  deployment_immediacy: immediate
                  resolution_immediacy: immediate

            - name: '10.5.1.0_24'
              bridge_domain: '10.5.1.0_24'
              vmware_vmm_domains:
                - name: hx-dev-01-vds-01
                  deployment_immediacy: immediate
                  resolution_immediacy: immediate

            - name: '10.5.2.0_24'
              bridge_domain: '10.5.2.0_24'
              vmware_vmm_domains:
                - name: hx-dev-01-vds-01
                  deployment_immediacy: immediate
                  resolution_immediacy: immediate

        - name: 'network-security-groups'
          description: 'ESGs are used to define security groups' 
          endpoint_security_groups:
            - name: 10.5.0.0_24
              vrf: vrf-02
              epg_selectors:
                - application_profile: 'network-segments'
                  endpoint_group: 10.5.0.0_24

            - name: 10.5.1.0_24
              vrf: vrf-02
              shutdown: false
              epg_selectors:
                - application_profile: network-segments
                  endpoint_group: 10.5.1.0_24

            - name: 10.5.2.0_24
              vrf: vrf-02
              shutdown: false
              epg_selectors:
                - application_profile: network-segments
                  endpoint_group: 10.5.2.0_24
