# Notes:
#
# Description: Build v05 delta from v04. Keeps north-south FTDv policy and adds smart-switch east-west service insertion using a physical L4-L7 device with matching redirect policy, health group, service graph template, and device-selection policy.

# subnet 10.5.0.0/21
# ftdv-01-eth2-gig-0-0
---
apic:
  tenants:
    - name: tech-elevate
      description: blueprint - v05
      managed: true
      security_domains:
        - tech-elevate

# Policies
      policies:
        bgp_timer_policies:
          - name: cilium-cni-bgp-timers
            description: BGP timer policies for cilium cni
            keepalive_interval: 1
            hold_interval: 3
            stale_interval: 6
            graceful_restart_helper: true
            maximum_as_limit: 1

        bgp_address_family_context_policies:
          - name: cilium-cni-bgp-af-context
            description: BGP weights and paths policies for cilium cni
            ebgp_distance: 20
            ibgp_distance: 200
            local_distance: 220
            ebgp_max_ecmp: 64
            ibgp_max_ecmp: 64
            local_max_ecmp: 4
            enable_host_route_leak: false

        bgp_peer_prefix_policies:
          - name: cilium-cni-bgp-prefix-policy
            description: BGP prefix policies for cilium cni
            action: 'reject'
            threshold: 75
            max_prefixes: 500

        bgp_best_path_policies:
          - name: cilium-cni-bgp-as-path
            description: BGP best path policy for cilium cni
            as_path_multipath_relax: true
            ignore_igp_metric: true

        match_rules:
          - name: pod-subnets-interleak
            description: match all pod subnets
            prefixes:
              - ip: 0.0.0.0/0
                aggregate: true
                to_length: 32

          - name: pod-subnets-redistribution
            description: match all pod subnets
            prefixes:
              - ip: 0.0.0.0/0
                aggregate: true
                to_length: 32

        route_control_route_maps:
          - name: floating-L3out-interleak-optimization
            type: global
            contexts:
              - name: pods-subnets
                action: permit
                match_rules:
                  - pod-subnets-interleak
                set_rule: floating-L3out-bgp-interleak-optimization

          - name: floating-L3out-redistribution-optimization
            type: global
            contexts:
              - name: pods-subnets
                action: permit
                match_rules:
                  - pod-subnets-redistribution
                set_rule: floating-L3out-bgp-redistribution-optimization

        set_rules:
          - name: floating-L3out-bgp-interleak-optimization
            community_mode: append
            next_hop_propagation: true
            multipath: true

          - name: floating-L3out-bgp-redistribution-optimization
            community_mode: append
            multipath: false
            next_hop_propagation: false

        ospf_interface_policies:
          - name: OSPF_p2p
            cost: unspecified
            passive_interface: false
            mtu_ignore: false
            advertise_subnet: true
            bfd: false
            hello_interval: 10
            dead_interval: 40
            network_type: p2p
            priority: 1
            lsa_retransmit_interval: 5
            lsa_transmit_delay: 1

        dhcp_relay_policies:
          - name: dhcp.uktme.cisco.com
            description: "dhcp.uktme.cisco.com"
            providers:
              - ip: 10.237.97.133
                type: external_epg
                tenant: shared-services
                l3out: shared-services.vrf-01-bgp-as-64801
                external_endpoint_group: core-services-subnets

# Services
      services:
        l4l7_devices:
          - name: ftdv-01-north-south
            vmware_vmm_domain: hx-dev-01-vds-01
            context_aware: single-Context
            type: VIRTUAL
            function: GoTo
            service_type: FW
            trunking: false
            concrete_devices:
              - name: ftdv-01-adapter-6-gig-0-3
                vcenter_name: hx-dev-01-vc01.uktme.cisco.com
                vm_name: ftdv72_82-01.uktme.cisco.com
                interfaces:
                  - name: data
                    vnic_name: Network adapter 6

            logical_interfaces:
              - name: data
                concrete_interfaces:
                  - device: ftdv-01-adapter-6-gig-0-3
                    interface_name: data

          - name: smart-switch-east-west
            physical_domain: smart-switches
            context_aware: single-Context
            type: PHYSICAL
            function: GoTo
            service_type: FW
            trunking: false
            concrete_devices:
              - name: smart-switch-east-west
                interfaces:
                  - name: data
                    pod_id: 1
                    node_id: 1101
                    node2_id: 1102
                    channel: vpc_to_smart-switch
            logical_interfaces:
              - name: data
                vlan: 30
                concrete_interfaces:
                  - device: smart-switch-east-west
                    interface_name: data

        redirect_policies:
          - name: ftdv-01-north-south
            anycast: false
            pod_aware: true
            resilient_hashing: false
            ip_sla_policy: icmp-aggressive-timers
            l3_destinations:
              - ip: 6.6.6.10
                name: ftdv-01-north-south
                mac: 00:50:56:A1:CF:6C
                redirect_health_group: ftdv-01-north-south

          - name: smart-switch-east-west
            anycast: false
            pod_aware: true
            resilient_hashing: false
            ip_sla_policy: icmp-aggressive-timers
            l3_destinations:
              - ip: 6.6.6.10
                name: smart-switch-east-west
                mac: 08:f4:f0:68:73:77
                redirect_health_group: smart-switch-east-west

        redirect_health_groups:
          - name: ftdv-01-north-south

          - name: smart-switch-east-west

        service_graph_templates:
          - name: ftdv-01-north-south
            template_type: FW_ROUTED
            redirect: true
            share_encapsulation: false
            device:
              tenant: tech-elevate
              name: ftdv-01-north-south
            consumer:
              direct_connect: false
            provider:
              direct_connect: true

          - name: smart-switch-east-west
            template_type: FW_ROUTED
            redirect: true
            share_encapsulation: false
            device:
              tenant: tech-elevate
              name: smart-switch-east-west
            consumer:
              direct_connect: false
            provider:
              direct_connect: true

        device_selection_policies:
          - contract: any
            service_graph_template: ftdv-01-north-south
            consumer:
              redirect_policy:
                name: ftdv-01-north-south
              logical_interface: data
              bridge_domain:
                name: 6.6.6.0_24
            provider:
              redirect_policy:
                name: ftdv-01-north-south
              logical_interface: data
              bridge_domain:
                name: 6.6.6.0_24

          - contract: any
            service_graph_template: smart-switch-east-west
            consumer:
              redirect_policy:
                name: smart-switch-east-west
              logical_interface: data
              bridge_domain:
                name: 6.6.6.0_24
            provider:
              redirect_policy:
                name: smart-switch-east-west
              logical_interface: data
              bridge_domain:
                name: 6.6.6.0_24


# Policies
      policies:
        ospf_interface_policies:
          - name: OSPF_p2p
            cost: unspecified
            passive_interface: false
            mtu_ignore: false
            advertise_subnet: true
            bfd: false
            hello_interval: 10
            dead_interval: 40
            network_type: p2p
            priority: 1
            lsa_retransmit_interval: 5
            lsa_transmit_delay: 1

        dhcp_relay_policies:
          - name: dhcp.uktme.cisco.com
            description: "dhcp.uktme.cisco.com"
            providers:
              - ip: 10.237.97.133
                type: external_epg
                tenant: shared-services
                l3out: shared-services.vrf-01-bgp-as-64801
                external_endpoint_group: core-services-subnets

        ip_sla_policies:
          - name: icmp-aggressive-timers
            description: This policy sends a icmp ping every 1 second
            frequency: 1
            multiplier: 3
            sla_type: icmp

# Filters
      filters:
        - name: 'icmp'
          entries:
            - name: 'icmp'
              protocol: icmp

        - name: 'src-any-dst-any'
          entries:
            - name: 'src-any-dst-any'
              ethertype: unspecified

# Contracts
      contracts:
        - name: intra-vrf
          description: vzAny is contract Consumer and Provider
          scope: context
          subjects:
            - name: permit-src-any-dst-any
              filters: 
                - filter: src-any-dst-any

        - name: permit-to-all-external-subnets-from-vzAny-vrf-02
          description: vzAny in vrf-02 is the contract Consumer
          scope: tenant
          subjects:
            - name: permit-src-any-dst-any
              filters: 
                - filter: src-any-dst-any

# VRFs
      vrfs:
        - name: vrf-01
          description: configured with NAC
          alias: outside-vrf
          leaked_external_prefixes:
            - prefix: 0.0.0.0/0
              destinations:
                - tenant: tech-elevate
                  vrf: vrf-02

        - name: vrf-02
          description: configured with NAC
          alias: inside-vrf
          
          contracts:
            providers: 
              - intra-vrf
            consumers: 
              - intra-vrf
              - permit-to-all-external-subnets-from-vzAny-vrf-02

          leaked_internal_prefixes:
            - prefix: 10.5.0.0/24
              public: true
              destinations:
                - tenant: tech-elevate
                  vrf: vrf-01
            - prefix: 10.5.1.0/24
              public: true
              destinations:
                - tenant: tech-elevate
                  vrf: vrf-01
            - prefix: 10.5.2.0/24
              public: true
              destinations:
                - tenant: tech-elevate
                  vrf: vrf-01

# L3out
      l3outs:
        - name: vrf-01-bgp-as-64805
          description: configured with NAC
          vrf: vrf-01
          domain: tech-elevate.vrf-01
          ospf:
            area: 0.0.0.0
            area_type: regular
          
# Nodes
          node_profiles:
