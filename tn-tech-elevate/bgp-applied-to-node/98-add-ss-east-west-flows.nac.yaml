                      ip: 10.237.97.102/31
                      mtu: inherit
                      mac: 10:12:BD:F8:19:FF
                  ospf:
                    policy: OSPF_p2p

# Nodes
            - name: border-leafs-pod-2
              nodes:
                - node_id: 2101
