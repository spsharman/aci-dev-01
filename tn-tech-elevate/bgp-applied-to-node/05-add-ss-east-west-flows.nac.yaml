# Notes:
#
# Description: This is the current production network design for Tech-Elevate. It is configured to allow open communication between all EPGs and external subnets. The design includes a single VRF, multiple bridge domains, and a BGP L3Out to the core network. The design also includes filters and contracts to allow ICMP traffic and any-to-any communication between EPGs.

# subnet 10.5.0.0/21
# ftdv-01-eth2-gig-0-0
---
apic:
  tenants:
    - name: tech-elevate
      description: blueprint - v06
      managed: true
      security_domains:
        - tech-elevate

# Services
      services:
        l4l7_devices:
          - name: ftdv-01-north-south
            vmware_vmm_domain: hx-dev-01-vds-01
            context_aware: single-Context
            type: VIRTUAL
            function: GoTo
            service_type: FW
            trunking: false
            concrete_devices:
              - name: ftdv-01-adapter-6-gig-0-3
                vcenter_name: hx-dev-01-vc01.uktme.cisco.com
                vm_name: ftdv72_82-01.uktme.cisco.com
                interfaces:
                  - name: data
                    vnic_name: Network adapter 6

            logical_interfaces:
              - name: data
                concrete_interfaces:
                  - device: ftdv-01-adapter-6-gig-0-3
                    interface_name: data

          - name: smart-switch-east-west
            physical_domain: smart-switches
            context_aware: single-Context
            type: PHYSICAL
            function: GoTo
            service_type: FW
            trunking: false
            concrete_devices:
              - name: smart-switch-east-west
                interfaces:
                  - name: data
                    pod_id: 1
                    node_id: 1101
                    node2_id: 1102
                    channel: vpc_to_smart-switch
            logical_interfaces:
              - name: data
                vlan: 30
                concrete_interfaces:
                  - device: smart-switch-east-west
                    interface_name: data

        redirect_policies:
          - name: ftdv-01-north-south
            anycast: false
            pod_aware: true
            resilient_hashing: false
            ip_sla_policy: icmp-aggressive-timers
            l3_destinations:
              - ip: 6.6.6.10
                name: ftdv-01-north-south
                mac: 00:50:56:A1:CF:6C
                redirect_health_group: ftdv-01-north-south

          - name: smart-switch-east-west
            anycast: false
            pod_aware: true
            resilient_hashing: false
            ip_sla_policy: icmp-aggressive-timers
            l3_destinations:
              - ip: 6.6.6.10
                name: smart-switch-east-west
                mac: 08:f4:f0:68:73:77
                redirect_health_group: smart-switch-east-west

        redirect_health_groups:
          - name: ftdv-01-north-south

          - name: smart-switch-east-west

        service_graph_templates:
          - name: ftdv-01-north-south
            template_type: FW_ROUTED
            redirect: true
            share_encapsulation: false
            device:
              tenant: tech-elevate
              name: ftdv-01-north-south
            consumer:
              direct_connect: false
            provider:
              direct_connect: true

          - name: smart-switch-east-west
            template_type: FW_ROUTED
            redirect: true
            share_encapsulation: false
            device:
              tenant: tech-elevate
              name: smart-switch-east-west
            consumer:
              direct_connect: false
            provider:
              direct_connect: true

        device_selection_policies:
          - contract: any
            service_graph_template: ftdv-01-north-south
            consumer:
              redirect_policy:
                name: ftdv-01-north-south
              logical_interface: data
              bridge_domain:
                name: 6.6.6.0_24
            provider:
              redirect_policy:
                name: ftdv-01-north-south
              logical_interface: data
              bridge_domain:
                name: 6.6.6.0_24

          - contract: any
            service_graph_template: smart-switch-east-west
            consumer:
              redirect_policy:
                name: smart-switch-east-west
              logical_interface: data
              bridge_domain:
                name: 6.6.6.0_24
            provider:
              redirect_policy:
                name: smart-switch-east-west
              logical_interface: data
              bridge_domain:
                name: 6.6.6.0_24


# Policies
      policies:
        ospf_interface_policies:
          - name: OSPF_p2p
            cost: unspecified
            passive_interface: false
            mtu_ignore: false
            advertise_subnet: true
            bfd: false
            hello_interval: 10
            dead_interval: 40
            network_type: p2p
            priority: 1
            lsa_retransmit_interval: 5
            lsa_transmit_delay: 1

        dhcp_relay_policies:
          - name: dhcp.uktme.cisco.com
            description: "dhcp.uktme.cisco.com"
            providers:
              - ip: 10.237.97.133
                type: external_epg
                tenant: shared-services
                l3out: shared-services.vrf-01-bgp-as-64801
                external_endpoint_group: core-services-subnets

        ip_sla_policies:
          - name: icmp-aggressive-timers
            description: This policy sends a icmp ping every 1 second
            frequency: 1
            multiplier: 3
            sla_type: icmp

# Filters
      filters:
        - name: 'icmp'
          entries:
            - name: 'icmp'
              protocol: icmp

        - name: 'src-any-dst-any'
          entries:
            - name: 'src-any-dst-any'
              ethertype: unspecified

# Contracts
      contracts:
        - name: intra-vrf
          description: vzAny is contract Consumer and Provider
          scope: context
          subjects:
            - name: permit-src-any-dst-any
              filters: 
                - filter: src-any-dst-any

        - name: permit-to-all-external-subnets-from-vzAny-vrf-02
          description: vzAny in vrf-02 is the contract Consumer
          scope: tenant
          subjects:
            - name: permit-src-any-dst-any
              filters: 
                - filter: src-any-dst-any

# VRFs
      vrfs:
        - name: vrf-01
          description: configured with NAC
          alias: outside-vrf
          leaked_external_prefixes:
            - prefix: 0.0.0.0
              destinations:
                - tenant: tech-elevate
                  vrf: vrf-02

        - name: vrf-02
          description: configured with NAC
          alias: inside-vrf
          
          contracts:
            providers: 
              - intra-vrf
            consumers: 
              - intra-vrf
              - permit-to-all-external-subnets-from-vzAny-vrf-02

          leaked_internal_prefixes:
            - prefix: 10.5.0.0/24
              public: true
              destinations:
                - tenant: tech-elevate
                  vrf: vrf-01
            - prefix: 10.5.1.0/24
              public: true
              destinations:
                - tenant: tech-elevate
                  vrf: vrf-01
            - prefix: 10.5.2.0/24
              public: true
              destinations:
                - tenant: tech-elevate
                  vrf: vrf-01

# L3out
      l3outs:
        - name: vrf-01-bgp-as-64805
          description: configured with NAC
          vrf: vrf-01
          domain: tech-elevate.vrf-01
          ospf:
            area: 0.0.0.0
            area_type: regular
          
# Nodes
          node_profiles:
            - name: border-leafs-pod-1
              nodes:
                - node_id: 1101
                  pod_id: 1
                  router_id: 110.1.0.5
                  router_id_as_loopback: false
                  loopbacks:
                    - 110.1.0.5

                - node_id: 1102
                  pod_id: 1
                  router_id: 110.2.0.5
                  router_id_as_loopback: false
                  loopbacks:
                    - 110.2.0.5

              bgp_peers:
                - ip: 12.0.0.3
                  description: L12-C93180YC-FX-01
                  remote_as: 64800  
                  local_as: 64805
                  allow_self_as: false
                  as_override: true
                  disable_peer_as_check: true
                  next_hop_self: false
                  send_community: false
                  send_ext_community: false
                  allowed_self_as_count: 3
                  bfd: false
                  disable_connected_check: false
                  ttl: 2
                  remove_all_private_as: false
                  remove_private_as: false
                  replace_private_as_with_local_as: false
                  unicast_address_family: true
                  multicast_address_family: false
                  admin_state: true
                  as_propagate: no-prepend

                - ip: 12.0.0.4
                  description: L12-C93180YC-EX-02
                  remote_as: 64800  
                  local_as: 64805
                  allow_self_as: false
                  as_override: true
                  disable_peer_as_check: true
                  next_hop_self: false
                  send_community: false
                  send_ext_community: false
                  allowed_self_as_count: 3
                  bfd: false
                  disable_connected_check: false
                  ttl: 2
                  remove_all_private_as: false
                  remove_private_as: false
                  replace_private_as_with_local_as: false
                  unicast_address_family: true
                  multicast_address_family: false
                  admin_state: true
                  as_propagate: no-prepend

# Interfaces
              interface_profiles:
                - name: leaf-1101-eth7.14
                  description: L12-C93180YC-FX-01 eth1/7.14
                  interfaces:
                    - node_id: 1101
                      pod_id: 1
                      port: 7
                      vlan: 14
                      svi: false
                      ip: 10.237.97.96/31
                      mtu: inherit
                      mac: 10:12:BD:F8:19:FF
                  ospf:
                    policy: OSPF_p2p

                - name: leaf-1101-eth8.14
                  description: L12-C93180YC-EX-02 eth1/8.14
                  interfaces:
                    - node_id: 1101
                      pod_id: 1
                      port: 8
                      vlan: 14
                      svi: false
                      ip: 10.237.97.98/31
                      mtu: inherit
                      mac: 10:12:BD:F8:19:FF
                  ospf:
                    policy: OSPF_p2p

                - name: leaf-1102-eth7.14
                  description: L12-C93180YC-EX-02 eth1/7.14
                  interfaces:
                    - node_id: 1102
                      pod_id: 1
                      port: 7
                      vlan: 14
                      svi: false
                      ip: 10.237.97.100/31
                      mtu: inherit
                      mac: 10:22:BD:F8:19:FF
                  ospf:
                    policy: OSPF_p2p

                - name: leaf-1102-eth8.14
                  description: L12-C93180YC-FX-01 eth1/8.14
                  interfaces:
                    - node_id: 1102
                      pod_id: 1
                      port: 8
                      vlan: 14
                      svi: false
                      ip: 10.237.97.102/31
                      mtu: inherit
                      mac: 10:12:BD:F8:19:FF
                  ospf:
                    policy: OSPF_p2p

# Nodes
            - name: border-leafs-pod-2
              nodes:
                - node_id: 2101
                  pod_id: 2
                  router_id: 210.1.0.5
                  router_id_as_loopback: false
                  loopbacks:
                    - 210.1.0.5

                - node_id: 2102
                  pod_id: 2
                  router_id: 210.2.0.5
                  router_id_as_loopback: false
                  loopbacks:
                    - 210.2.0.5

              bgp_peers:
                - ip: 13.0.0.3
                  description: L13-C93180YC-FX-01
                  remote_as: 64800  
                  local_as: 64805
                  allow_self_as: false
                  as_override: true
                  disable_peer_as_check: true
                  next_hop_self: false
                  send_community: false
                  send_ext_community: false
                  allowed_self_as_count: 3
                  bfd: false
                  disable_connected_check: false
                  ttl: 2
                  remove_all_private_as: false
                  remove_private_as: false
                  replace_private_as_with_local_as: false
                  unicast_address_family: true
                  multicast_address_family: false
                  admin_state: true
                  as_propagate: no-prepend

                - ip: 13.0.0.4
                  description: L13-C93180YC-FX-02
                  remote_as: 64800  
                  local_as: 64805
                  allow_self_as: false
                  as_override: true
                  disable_peer_as_check: true
                  next_hop_self: false
                  send_community: false
                  send_ext_community: false
                  allowed_self_as_count: 3
                  bfd: false
                  disable_connected_check: false
                  ttl: 2
                  remove_all_private_as: false
                  remove_private_as: false
                  replace_private_as_with_local_as: false
                  unicast_address_family: true
                  multicast_address_family: false
                  admin_state: true
                  as_propagate: no-prepend

# Interfaces
              interface_profiles:
                - name: leaf-2101-eth7.14
                  description: L13-C93180YC-FX-01 eth1/7.14
                  interfaces:
                    - node_id: 2101
                      pod_id: 2
                      port: 7
                      vlan: 14
                      svi: false
                      ip: 10.237.97.104/31
                      mtu: inherit
                      mac: 10:12:BD:F8:19:FF
                  ospf:
                    policy: OSPF_p2p

                - name: leaf-2101-eth8.14
                  description: L13-C93180YC-EX-02 eth1/8.14
                  interfaces:
                    - node_id: 2101
                      pod_id: 2
                      port: 8
                      vlan: 14
                      svi: false
                      ip: 10.237.97.106/31
                      mtu: inherit
                      mac: 10:12:BD:F8:19:FF
                  ospf:
                    policy: OSPF_p2p

                - name: leaf-2102-eth7.14
                  description: L13-C93180YC-FX-02 eth1/7.14
                  interfaces:
                    - node_id: 2102
                      pod_id: 2
                      port: 7
                      vlan: 14
                      svi: false
                      ip: 10.237.97.108/31
                      mtu: inherit
                      mac: 10:22:BD:F8:19:FF
                  ospf:
                    policy: OSPF_p2p

                - name: leaf-2102-eth8.14
                  description: L13-C93180YC-FX-01 eth1/8.14
                  interfaces:
                    - node_id: 2102
                      pod_id: 2
                      port: 8
                      vlan: 14
                      svi: false
                      ip: 10.237.97.110/31
                      mtu: inherit
                      mac: 10:12:BD:F8:19:FF
                  ospf:
                    policy: OSPF_p2p

# extEPGs
          external_endpoint_groups:
            - name: all-external-subnets
              subnets:
                - prefix: 0.0.0.0/0
                  shared_route_control: true
                  import_security: false

                - prefix: 0.0.0.0/1
                  shared_security: true
                  import_security: true

                - prefix: 128.0.0.0/1
                  shared_security: true
                  import_security: true

              contracts:
                providers:
                  - permit-to-all-external-subnets-from-vzAny-vrf-02

# Bridge Domains
      bridge_domains:
        - name: 6.6.6.0_24
          unknown_unicast: proxy
          vrf: vrf-02
          subnets:
            - ip: 6.6.6.1/24

        - name: 10.5.0.0_24
          unknown_unicast: proxy
          vrf: vrf-02
          subnets:
            - ip: 10.5.0.1/24
          dhcp_labels:
            - dhcp_relay_policy: dhcp.uktme.cisco.com
              scope: tenant

        - name: 10.5.1.0_24
          unknown_unicast: proxy
          vrf: vrf-02
          subnets:
            - ip: 10.5.1.1/24
          dhcp_labels:
            - dhcp_relay_policy: dhcp.uktme.cisco.com
              scope: tenant

        - name: 10.5.2.0_24
          unknown_unicast: proxy
          vrf: vrf-02
          subnets:
            - ip: 10.5.2.1/24
          dhcp_labels:
            - dhcp_relay_policy: dhcp.uktme.cisco.com
              scope: tenant

# Application profiles
      application_profiles:
        - name: 'network-segments'
          description: EPGs provide the VLAN backing for application workloads
          endpoint_groups:      
            - name: '10.5.0.0_24'
              bridge_domain: '10.5.0.0_24'
              vmware_vmm_domains:
                - name: hx-dev-01-vds-01
                  deployment_immediacy: immediate
                  resolution_immediacy: immediate

            - name: '10.5.1.0_24'
              bridge_domain: '10.5.1.0_24'
              vmware_vmm_domains:
                - name: hx-dev-01-vds-01
                  deployment_immediacy: immediate
                  resolution_immediacy: immediate

            - name: '10.5.2.0_24'
              bridge_domain: '10.5.2.0_24'
              vmware_vmm_domains:
                - name: hx-dev-01-vds-01
                  deployment_immediacy: immediate
                  resolution_immediacy: immediate

        - name: 'network-security-groups'
          description: 'ESGs are used to define security groups' 
          endpoint_security_groups:
            - name: 10.5.0.0_24
              vrf: vrf-02
              epg_selectors:
                - application_profile: 'network-segments'
                  endpoint_group: 10.5.0.0_24

            - name: 10.5.1.0_24
              vrf: vrf-02
              shutdown: false
              epg_selectors:
                - application_profile: network-segments
                  endpoint_group: 10.5.1.0_24

            - name: 10.5.2.0_24
              vrf: vrf-02
              shutdown: false
              epg_selectors:
                - application_profile: network-segments
                  endpoint_group: 10.5.2.0_24
